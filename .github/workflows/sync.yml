name: Sync to Another Repo

# 触发条件：当 main 分支有 push 事件时执行
on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取源仓库（仓库 A）的最新代码
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，确保所有分支信息都被拉取

      # 2. 执行同步操作，使用社区提供的镜像同步 Action
      - name: Mirror to Target Repo
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: "git@github.com:SPTurbo/SPTurbo.git"
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh_username: git
