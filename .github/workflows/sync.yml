name: Sync from upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync from upstream
        env:
          GH_TOKEN: ${{ secrets.A_TOKEN }}
        run: |
          git remote add upstream https://github.com/LinMouGroup/SPTurbo.git
          git fetch upstream --prune
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git upstream/main:main --force
